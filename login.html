{% extends "base.html" %}
{% block content %}
<div class="login-box card">
    <h2>Login</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="Username (admin)" class="input" required>
        <input type="password" name="password" placeholder="Password (admin123)" class="input" required>
        <button type="submit" class="btn">Login</button>
    </form>
    {% if error %}<p style="color: red">{{ error }}</p>{% endif %}
    
    <h3 style="margin-top: 20px;">Sign Up</h3>
    <form method="POST" action="/signup">
        <input type="text" name="name" placeholder="Full Name" class="input" required>
        <input type="text" name="username" placeholder="New Username" class="input" required>
        <input type="password" name="password" placeholder="New Password" class="input" required>
        <button type="submit" class="btn" style="background:#555">Sign Up</button>
    </form>
</div>
{% endblock %}
