<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow – Role-Based Team Task Manager</title>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338ca;
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --border: #e5e7eb;
            --sidebar-width: 260px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg-body); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; }

        /* --- Utility --- */
        .hidden { display: none !important; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .w-full { width: 100%; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        .text-sm { font-size: 0.875rem; }
        .font-bold { font-weight: 700; }
        .text-danger { color: var(--danger); }
        .cursor-pointer { cursor: pointer; }

        /* --- UI Components --- */
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 0.375rem;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.9rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background: #f9fafb; }
        .btn-danger { background: #fee2e2; color: var(--danger); }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }

        input, select, textarea {
            width: 100%; padding: 0.75rem;
            border: 1px solid var(--border); border-radius: 0.375rem;
            margin-bottom: 1rem; font-size: 0.95rem; outline: none;
        }
        input:focus, select:focus { border-color: var(--primary); ring: 2px solid var(--primary); }
        label { display: block; margin-bottom: 0.4rem; font-weight: 500; font-size: 0.9rem; }

        /* --- Layout --- */
        #app { display: flex; height: 100vh; width: 100vw; }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width); background: var(--bg-card);
            border-right: 1px solid var(--border); display: flex;
            flex-direction: column; padding: 1.5rem; z-index: 10;
        }
        .brand {
            font-size: 1.25rem; font-weight: 800; color: var(--primary);
            margin-bottom: 2.5rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .nav-link {
            padding: 0.75rem 1rem; border-radius: 0.375rem; color: var(--text-muted);
            text-decoration: none; margin-bottom: 0.5rem; display: flex;
            align-items: center; gap: 0.75rem; font-weight: 500;
        }
        .nav-link:hover, .nav-link.active { background: #e0e7ff; color: var(--primary); }
        .user-profile { margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; }

        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 2rem; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .page-title { font-size: 1.75rem; font-weight: 700; color: var(--text-main); }

        /* Title Screen */
        #title-screen {
            position: fixed; inset: 0; background: var(--bg-card);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 50; transition: opacity 0.5s;
        }
        .title-text { font-size: 3rem; font-weight: 800; color: var(--primary); margin-bottom: 1rem; text-align: center; }
        .subtitle { font-size: 1.2rem; color: var(--text-muted); }
        .start-btn { margin-top: 2rem; padding: 1rem 2rem; font-size: 1.1rem; }

        /* Auth Screen */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg-body);
            display: flex; align-items: center; justify-content: center; z-index: 40;
        }
        .auth-box { background: white; padding: 2.5rem; border-radius: 0.75rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .auth-toggle { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
        .auth-toggle a { color: var(--primary); cursor: pointer; font-weight: 600; }

        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--bg-card); padding: 1.5rem; border-radius: 0.5rem; border: 1px solid var(--border); }
        .stat-val { font-size: 2rem; font-weight: 700; color: var(--text-main); }
        .stat-label { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem; }

        /* Projects List */
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .project-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 0.5rem; overflow: hidden; transition: 0.2s; }
        .project-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .pc-header { padding: 1.25rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .pc-body { padding: 1.25rem; }
        .pc-footer { padding: 1rem 1.25rem; background: #f9fafb; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        /* Tasks */
        .task-list { display: flex; flex-direction: column; gap: 1rem; }
        .task-item { background: white; padding: 1rem; border-radius: 0.375rem; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .task-status { padding: 0.25rem 0.5rem; border-radius: 1rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .status-todo { background: #f3f4f6; color: #374151; }
        .status-inprogress { background: #dbeafe; color: #1e40af; }
        .status-done { background: #d1fae5; color: #065f46; }

        /* Team Table */
        .team-table { width: 100%; border-collapse: collapse; background: white; border-radius: 0.5rem; overflow: hidden; border: 1px solid var(--border); }
        .team-table th, .team-table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        .team-table th { background: #f9fafb; font-weight: 600; }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: 0.2s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .modal { background: white; width: 100%; max-width: 450px; padding: 2rem; border-radius: 0.5rem; }
        .close-modal { float: right; cursor: pointer; font-size: 1.2rem; color: var(--text-muted); }

        /* Toast */
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 12px 24px; border-radius: 4px; z-index: 200; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; position: absolute; height: 100%; left: 0; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
            .sidebar.active { display: flex; }
            .mobile-menu-btn { display: block !important; margin-right: 1rem; }
        }
        .mobile-menu-btn { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; }

    </style>
</head>
<body>

    <!-- 1. Title Screen -->
    <div id="title-screen">
        <h1 class="title-text">TaskFlow</h1>
        <p class="subtitle">Role-Based Team Task Manager</p>
        <button class="btn btn-primary start-btn" onclick="app.showAuth()">Get Started</button>
    </div>

    <!-- 2. Auth Screen -->
    <div id="auth-screen" class="hidden">
        <div class="auth-box">
            <h2 class="page-title" style="margin-bottom: 1.5rem; text-align: center;">Welcome</h2>
            <form id="auth-form">
                <label>Email</label>
                <input type="email" id="auth-email" placeholder="admin@test.com" required>
                <label>Password</label>
                <input type="password" id="auth-password" placeholder="admin123" required>
                <button type="submit" class="btn btn-primary w-full">Log In</button>
            </form>
            <div class="auth-toggle">
                Don't have an account? <a>Sign Up</a>
            </div>
            <div style="margin-top: 1rem; font-size: 0.8rem; color: #666; background: #f0f9ff; padding: 0.5rem; border-radius: 4px;">
                <strong>Demo Admin:</strong> admin@test.com / admin123<br>
                <strong>Demo Member:</strong> member@test.com / member123
            </div>
        </div>
    </div>

    <!-- 3. Main Application -->
    <div id="app" class="hidden">
        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
            <div class="brand"><i class="fa-solid fa-layer-group"></i> TaskFlow</div>
            
            <a href="#" class="nav-link active" onclick="app.nav('dashboard')">
                <i class="fa-solid fa-chart-pie"></i> Dashboard
            </a>
            <a href="#" class="nav-link" onclick="app.nav('projects')">
                <i class="fa-solid fa-folder"></i> Projects
            </a>
            <!-- Admin Only Link -->
            <a href="#" class="nav-link hidden admin-only" onclick="app.nav('team')">
                <i class="fa-solid fa-users"></i> Team Management
            </a>

            <div class="user-profile">
                <div class="avatar" id="userAvatar">AD</div>
                <div style="flex:1">
                    <div class="font-bold text-sm" id="userName">Admin</div>
                    <div class="text-sm text-muted" id="userRole">Administrator</div>
                </div>
                <button class="btn-outline btn-sm" onclick="app.logout()"><i class="fa-solid fa-sign-out-alt"></i></button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('active')">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div id="content-area">
                <!-- Content injected via JS -->
            </div>
        </main>
    </div>

    <!-- Create Project Modal -->
    <div id="project-modal" class="modal-overlay">
        <div class="modal">
            <div style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                <h3>Create New Project</h3>
                <span class="close-modal" onclick="closeModal('project-modal')">&times;</span>
            </div>
            <form onsubmit="app.createProject(event)">
                <label>Project Name</label>
                <input type="text" id="p-name" required>
                <label>Description</label>
                <textarea id="p-desc" rows="3" required></textarea>
                <button class="btn btn-primary w-full">Create Project</button>
            </form>
        </div>
    </div>

    <!-- Create Task Modal -->
    <div id="task-modal" class="modal-overlay">
        <div class="modal">
            <div style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                <h3>Add New Task</h3>
                <span class="close-modal" onclick="closeModal('task-modal')">&times;</span>
            </div>
            <form onsubmit="app.createTask(event)">
                <input type="hidden" id="t-proj-id">
                <label>Task Title</label>
                <input type="text" id="t-title" required>
                <label>Assignee</label>
                <select id="t-assignee"></select>
                <label>Status</label>
                <select id="t-status">
                    <option value="todo">To Do</option>
                    <option value="inprogress">In Progress</option>
                    <option value="done">Done</option>
                </select>
                <button class="btn btn-primary w-full">Save Task</button>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        // --- Utils & Mock DB ---
        const Utils = {
            id: () => Math.random().toString(36).substr(2, 9),
            toast: (msg) => {
                const t = document.createElement('div');
                t.className = 'toast';
                t.innerText = msg;
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 3000);
            }
        };

        const DB = {
            init: () => {
                if(!localStorage.getItem('tf_users')) {
                    const users = [
                        { id: 'u1', name: 'Admin User', email: 'admin@test.com', pass: 'admin123', role: 'admin' },
                        { id: 'u2', name: 'Team Member', email: 'member@test.com', pass: 'member123', role: 'member' }
                    ];
                    const projects = [
                        { id: 'p1', name: 'Website Launch', desc: 'Q4 Marketing Site', ownerId: 'u1' },
                        { id: 'p2', name: 'Mobile App Beta', desc: 'Internal testing build', ownerId: 'u1' }
                    ];
                    const tasks = [
                        { id: 't1', pId: 'p1', title: 'Design Homepage', assignee: 'u1', status: 'done' },
                        { id: 't2', pId: 'p1', title: 'Copywriting', assignee: 'u2', status: 'inprogress' }
                    ];
                    localStorage.setItem('tf_users', JSON.stringify(users));
                    localStorage.setItem('tf_projects', JSON.stringify(projects));
                    localStorage.setItem('tf_tasks', JSON.stringify(tasks));
                }
            },
            get: (key) => JSON.parse(localStorage.getItem('tf_' + key) || '[]'),
            add: (key, item) => {
                const data = DB.get(key);
                data.push(item);
                localStorage.setItem('tf_' + key, JSON.stringify(data));
            },
            update: (key, id, updates) => {
                const data = DB.get(key);
                const idx = data.findIndex(i => i.id === id);
                if(idx > -1) {
                    data[idx] = { ...data[idx], ...updates };
                    localStorage.setItem('tf_' + key, JSON.stringify(data));
                }
            }
        };

        DB.init();

        // --- App Logic ---
        class App {
            constructor() {
                this.user = JSON.parse(localStorage.getItem('tf_currUser'));
                this.view = '';
                
                // Event Listener for Auth Form
                document.getElementById('auth-form').onsubmit = (e) => {
                    e.preventDefault();
                    const email = document.getElementById('auth-email').value;
                    const pass = document.getElementById('auth-password').value;
                    const users = DB.get('users');
                    const found = users.find(u => u.email === email && u.pass === pass);
                    
                    if(found) {
                        this.user = found;
                        localStorage.setItem('tf_currUser', JSON.stringify(found));
                        this.enterApp();
                    } else {
                        alert('Invalid credentials');
                    }
                };
            }

            showAuth() {
                document.getElementById('title-screen').classList.add('hidden');
                document.getElementById('auth-screen').classList.remove('hidden');
            }

            enterApp() {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                this.updateProfile();
                this.nav('dashboard');
            }

            logout() {
                this.user = null;
                localStorage.removeItem('tf_currUser');
                location.reload();
            }

            updateProfile() {
                document.getElementById('userName').innerText = this.user.name;
                document.getElementById('userRole').innerText = this.user.role;
                document.getElementById('userAvatar').innerText = this.user.name.substring(0,2).toUpperCase();
                
                // Admin check
                const adminLinks = document.querySelectorAll('.admin-only');
                adminLinks.forEach(el => el.classList.toggle('hidden', this.user.role !== 'admin'));
            }

            nav(view, param = null) {
                this.view = view;
                
                // Highlight Sidebar
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                const active = document.querySelector(`.nav-link[onclick="app.nav('${view}')"]`);
                if(active) active.classList.add('active');

                // Mobile Sidebar Close
                document.getElementById('sidebar').classList.remove('active');

                const container = document.getElementById('content-area');
                
                if(view === 'dashboard') this.renderDashboard(container);
                else if(view === 'projects') this.renderProjects(container);
                else if(view === 'project-detail') this.renderDetail(container, param);
                else if(view === 'team') this.renderTeam(container);
            }

            // --- VIEW: Dashboard ---
            renderDashboard(el) {
                const projects = DB.get('projects');
                const tasks = DB.get('tasks');
                const total = tasks.length;
                const done = tasks.filter(t => t.status === 'done').length;
                const percent = total === 0 ? 0 : Math.round((done/total)*100);
                const overdue = tasks.filter(t => t.status !== 'done').length; // Simplified logic

                el.innerHTML = `
                    <div class="header"><h2 class="page-title">Dashboard</h2></div>
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-val">${projects.length}</div><div class="stat-label">Total Projects</div></div>
                        <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-label">Total Tasks</div></div>
                        <div class="stat-card"><div class="stat-val" style="color:var(--primary)">${percent}%</div><div class="stat-label">Completion</div></div>
                        <div class="stat-card"><div class="stat-val" style="color:${overdue>0?'var(--danger)':'var(--text-main)'}">${overdue}</div><div class="stat-label">Pending Tasks</div></div>
                    </div>
                    <h3 style="margin-bottom:1rem;">Recent Activity</h3>
                    <div style="background:white; padding:1.5rem; border-radius:0.5rem; border:1px solid var(--border); color:var(--text-muted);">
                        System operational. Projects tracking normally.
                    </div>
                `;
            }

            // --- VIEW: Projects ---
            renderProjects(el) {
                const projects = DB.get('projects');
                el.innerHTML = `
                    <div class="header">
                        <h2 class="page-title">Projects</h2>
                        <button class="btn btn-primary" onclick="openModal('project-modal')"><i class="fa-solid fa-plus"></i> Create Project</button>
                    </div>
                    <div class="projects-grid">
                        ${projects.map(p => `
                            <div class="project-card cursor-pointer" onclick="app.nav('project-detail', '${p.id}')">
                                <div class="pc-header"><strong>${p.name}</strong></div>
                                <div class="pc-body"><p class="text-sm text-muted">${p.desc}</p></div>
                                <div class="pc-footer">
                                    <span class="text-sm">View Tasks</span>
                                    <i class="fa-solid fa-arrow-right text-muted"></i>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            createProject(e) {
                e.preventDefault();
                const name = document.getElementById('p-name').value;
                const desc = document.getElementById('p-desc').value;
                DB.add('projects', { id: Utils.id(), name, desc, ownerId: this.user.id });
                closeModal('project-modal');
                Utils.toast('Project created');
                this.nav('projects');
                e.target.reset();
            }

            // --- VIEW: Project Detail ---
            renderDetail(el, pid) {
                const project = DB.get('projects').find(p => p.id === pid);
                const tasks = DB.get('tasks').filter(t => t.pId === pid);
                const users = DB.get('users');

                el.innerHTML = `
                    <div class="header">
                        <div class="flex items-center gap-2">
                            <button class="btn-outline btn-sm" onclick="app.nav('projects')"><i class="fa-solid fa-arrow-left"></i></button>
                            <h2 class="page-title">${project.name}</h2>
                        </div>
                        <button class="btn btn-primary" onclick="app.openTaskModal('${pid}')"><i class="fa-solid fa-plus"></i> Add Task</button>
                    </div>
                    <div class="task-list">
                        ${tasks.map(t => {
                            const assignee = users.find(u => u.id === t.assignee);
                            return `
                                <div class="task-item">
                                    <div>
                                        <div class="font-bold">${t.title}</div>
                                        <div class="text-sm text-muted">Assigned to: ${assignee ? assignee.name : 'Unknown'}</div>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <span class="task-status status-${t.status}">${t.status.replace('inprogress','In Progress')}</span>
                                        <button class="btn-outline btn-sm text-danger" onclick="app.deleteTask('${t.id}', '${pid}')"><i class="fa-solid fa-trash"></i></button>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                        ${tasks.length === 0 ? '<p class="text-muted">No tasks yet.</p>' : ''}
                    </div>
                `;
            }

            openTaskModal(pid) {
                document.getElementById('t-proj-id').value = pid;
                const users = DB.get('users');
                const sel = document.getElementById('t-assignee');
                sel.innerHTML = users.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
                openModal('task-modal');
            }

            createTask(e) {
                e.preventDefault();
                const pId = document.getElementById('t-proj-id').value;
                const title = document.getElementById('t-title').value;
                const assignee = document.getElementById('t-assignee').value;
                const status = document.getElementById('t-status').value;

                DB.add('tasks', { id: Utils.id(), pId, title, assignee, status });
                closeModal('task-modal');
                Utils.toast('Task added');
                this.nav('project-detail', pId);
                e.target.reset();
            }

            deleteTask(tid, pid) {
                if(confirm('Delete task?')) {
                    const all = DB.get('tasks').filter(t => t.id !== tid);
                    localStorage.setItem('tf_tasks', JSON.stringify(all));
                    this.nav('project-detail', pid);
                }
            }

            // --- VIEW: Team (Admin Only) ---
            renderTeam(el) {
                const users = DB.get('users');
                el.innerHTML = `
                    <div class="header"><h2 class="page-title">Team Management</h2></div>
                    <table class="team-table">
                        <thead><tr><th>Name</th><th>Email</th><th>Role</th></tr></thead>
                        <tbody>
                            ${users.map(u => `
                                <tr>
                                    <td><div class="flex items-center gap-2"><div class="avatar">${u.name.substring(0,2)}</div>${u.name}</div></td>
                                    <td>${u.email}</td>
                                    <td><span class="badge" style="background:#e0e7ff; color:var(--primary); padding:2px 8px; border-radius:10px; font-size:0.8rem;">${u.role}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }
        }

        // Helpers
        function openModal(id) { document.getElementById(id).classList.add('open'); }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }

        // Init
        const app = new App();
        if(app.user) app.enterApp();

    </script>
</body>
</html>
