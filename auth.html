{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 50px auto;">
    <!-- Login -->
    <div class="card">
        <h2 style="margin-bottom: 20px;">Login</h2>
        <form method="POST">
            <input type="hidden" name="form_type" value="login">
            <input type="text" name="username" class="input" placeholder="Username (admin)" required>
            <input type="password" name="password" class="input" placeholder="Password (admin123)" required>
            <button type="submit" class="btn" style="width: 100%;">Login</button>
        </form>
    </div>

    <!-- Signup -->
    <div class="card" style="text-align: center;">
        <h2 style="margin-bottom: 20px;">Sign Up</h2>
        <form method="POST">
            <input type="hidden" name="form_type" value="signup">
            <input type="text" name="name" class="input" placeholder="Full Name" required>
            <input type="email" name="email" class="input" placeholder="Email Address" required>
            <input type="text" name="username" class="input" placeholder="Choose Username" required>
            <input type="password" name="password" class="input" placeholder="Password" required>
            <select name="role" class="input">
                <option value="member">Team Member</option>
                <option value="admin">Admin</option>
            </select>
            <button type="submit" class="btn" style="width: 100%; background: #0f172a;">Create Account</button>
        </form>
    </div>
</div>
{% endblock %}
