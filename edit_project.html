{% extends "base.html" %}
{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <a href="/projects" style="text-decoration: none; color: var(--primary);">← Back to Projects</a>
    <div class="card" style="margin-top: 20px;">
        <h2>Edit Project</h2>
        <form method="POST">
            <label style="font-weight: bold; margin-bottom: 5px; display: block;">Project Title *</label>
            <input type="text" name="title" class="input" value="{{ project.title }}" required>
            
            <label style="font-weight: bold; margin-bottom: 5px; display: block;">Description</label>
            <textarea name="description" class="input" placeholder="Project description" style="height: 100px; resize: vertical;">{{ project.description or '' }}</textarea>
            
            <label style="font-weight: bold; margin-bottom: 5px; display: block;">Deadline</label>
            <input type="date" name="deadline" class="input" value="{% if project.deadline %}{{ project.deadline }}{% endif %}">
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn">Update Project</button>
                <a href="/projects" class="btn" style="background: #94a3b8; text-align: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
